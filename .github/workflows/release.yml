name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install deps
              run: npm install

            - name: Build
              run: npm run build

            - name: Prepare files
              run: |
                  mkdir release
                  cp main.js manifest.json style.css release/

            - name: Zip
              run: |
                  cd release
                  zip -r ../plugin.zip .

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: plugin.zip
